<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking confirmed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101010; color: #e5e5e5;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 40px 16px;
    }
    .card {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 16px; max-width: 420px; width: 100%;
      padding: 48px 36px; text-align: center;
    }
    .check-circle {
      width: 56px; height: 56px; border-radius: 50%;
      background: #14532d; border: 1px solid #166534;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .check-circle svg { color: #22c55e; }
    h1 { font-size: 1.3rem; font-weight: 600; color: #fff; margin-bottom: 10px; }
    .slot-label { font-size: 1rem; font-weight: 600; color: #a5b4fc; margin-bottom: 6px; }
    .detail { color: #666; font-size: 0.875rem; line-height: 1.6; }
    .note {
      margin-top: 22px; padding: 14px 16px;
      background: #1f1f1f; border: 1px solid #2a2a2a;
      border-radius: 8px; font-size: 0.85rem; color: #888; line-height: 1.6;
    }
    .meet-note {
      margin-top: 12px; padding: 12px 14px;
      background: #1a2a1a; border: 1px solid #1e3a1e;
      border-radius: 8px; font-size: 0.82rem; color: #86efac;
      display: flex; align-items: center; gap: 8px;
    }
    .footer { margin-top: 28px; font-size: 0.75rem; color: #333; }
  </style>
</head>
<body>
<div class="card">
  <div class="check-circle">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h1>You're booked, {{ name }}!</h1>
  <div class="slot-label">{{ slot_label }}</div>
  <div class="detail">A calendar invite with a Google Meet link is on its way to your inbox.</div>
  {% if config.confirmation_message %}
  <div class="note">{{ config.confirmation_message }}</div>
  {% endif %}
  <div class="meet-note">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
    </svg>
    Google Meet link included in your invite
  </div>
  <div class="footer">Powered by Free Cal Everywhere</div>
</div>
</body>
</html>
