<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking confirmed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5; color: #1a1a1a; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 40px 16px;
    }
    .card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      max-width: 480px; width: 100%; padding: 48px 40px; text-align: center;
    }
    .check {
      width: 56px; height: 56px; background: #ecfdf5; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; font-size: 1.6rem;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 12px; }
    .detail { color: #555; font-size: 0.95rem; line-height: 1.6; margin-bottom: 8px; }
    .slot { font-weight: 600; color: #1a1a1a; }
    .note {
      margin-top: 24px; padding: 16px; background: #f9fafb;
      border-radius: 8px; font-size: 0.875rem; color: #555; line-height: 1.6;
    }
    .footer { margin-top: 32px; font-size: 0.8rem; color: #aaa; }
  </style>
</head>
<body>
<div class="card">
  <div class="check">✓</div>
  <h1>You're booked, {{ name }}!</h1>
  <p class="detail">
    <span class="slot">{{ slot_label }}</span>
  </p>
  <p class="detail">A calendar invite is on its way to your inbox.</p>
  {% if config.confirmation_message %}
  <div class="note">{{ config.confirmation_message }}</div>
  {% endif %}
  <div class="footer">Powered by cal-book</div>
</div>
</body>
</html>
